<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
<title>Not found · Odisena Console</title>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fafaf9; color: #0a0a0a; padding: 24px; text-align: center;
  }
  @media (prefers-color-scheme: dark) { body { background: #0a0a0a; color: #fafaf9; } }
  .wrap { max-width: 420px; }
  .code { font-size: 64px; font-weight: 700; letter-spacing: -0.03em; margin: 0; opacity: 0.9; }
  h1 { font-size: 20px; margin: 8px 0 4px; }
  p { opacity: 0.7; line-height: 1.5; margin: 0 0 24px; }
  a.btn {
    display: inline-block; text-decoration: none; padding: 12px 22px; border-radius: 12px;
    background: #0a0a0a; color: #fafaf9; font-weight: 600;
  }
  @media (prefers-color-scheme: dark) { a.btn { background: #fafaf9; color: #0a0a0a; } }
</style>
</head>
<body>
  <div class="wrap">
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>That route isn't part of the Odisena Console. Head back to the command center.</p>
    <a class="btn" href="./">Return to Console</a>
  </div>
</body>
</html>
