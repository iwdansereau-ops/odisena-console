# =============================================================================
# OTel Pipeline — Nightly Performance Gate
# =============================================================================
# Runs a full benchmark of the OTel Collector build against a controlled
# telemetrygen workload, compares to the rolling 7-day production baseline,
# and BLOCKS merges to `main` when the performance budget is exceeded.
#
# Runner requirement:
#   Use a self-hosted bare-metal runner labeled `otel-perf-runner`
#   (GitHub-hosted runners exhibit 2-4% CV — see Codspeed 2025-07 study —
#   which drowns out sub-10% regressions).
# =============================================================================

name: otel-nightly-perf

on:
  schedule:
    - cron: "0 6 * * *"          # 06:00 UTC nightly
  workflow_dispatch:
    inputs:
      compare_ref:
        description: "Git ref to benchmark (default: main)"
        default: "main"
      dry_run:
        description: "Do not block on failure"
        type: boolean
        default: false
  pull_request:
    branches: [main]
    paths:
      - "collector/**"
      - "processors/**"
      - "exporters/**"
      - "receivers/**"
      - ".github/workflows/otel-nightly-perf.yml"

# Serialize: only one perf run at a time on the dedicated runner.
concurrency:
  group: otel-perf-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write        # to post scorecard comment
  checks: write               # to create the "Performance Gate" check
  id-token: write             # OIDC for S3 baseline access

env:
  BUDGET_CONFIG: config/performance-budget.yaml
  REPORT_DIR:    reports
  # Load profile — matched to production p95 volume, not peak
  LOAD_SPANS_PER_SEC: "20000"
  LOAD_DURATION_SEC:  "600"    # 10 min sustained
  LOAD_WORKERS:       "10"
  WARMUP_SEC:         "60"
  REPETITIONS:        "5"      # M >= 5 (FOSDEM 2026 guidance)

jobs:
  # ---------------------------------------------------------------------------
  # 1) Bench: run 5 independent iterations of the load test
  # ---------------------------------------------------------------------------
  bench:
    name: Run benchmark (5x)
    runs-on: [self-hosted, Linux, X64, otel-perf-runner]
    timeout-minutes: 90
    outputs:
      current_artifact: ${{ steps.upload.outputs.artifact-id }}
    strategy:
      matrix:
        iteration: [1, 2, 3, 4, 5]
      fail-fast: false          # collect all 5 runs even if one hiccups
      max-parallel: 1           # NEVER parallel — noisy neighbor kills signal

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.compare_ref || github.ref }}
          fetch-depth: 1

      - name: Pin runner to performance mode
        run: |
          set -euo pipefail
          # These require sudoers entries on the self-hosted runner. See
          # docs/runner-provisioning.md. On shared/hosted runners, skip.
          sudo /usr/local/bin/set-cpu-frequency.sh || echo "warn: cpufreq skipped"
          sudo /usr/local/bin/disable-hyperthreading.sh || echo "warn: SMT skipped"
          echo "GOMAXPROCS=$(nproc)" >> "$GITHUB_ENV"

      - name: Build otelcol-contrib binary
        run: |
          make otelcol-contrib
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Install telemetrygen
        run: |
          go install github.com/open-telemetry/opentelemetry-collector-contrib/cmd/telemetrygen@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Start collector
        run: |
          nohup otelcol-contrib --config testdata/collector-bench.yaml \
              > collector.log 2>&1 &
          echo $! > collector.pid
          # Wait for readiness on health_check endpoint
          for i in $(seq 1 30); do
            curl -sf http://localhost:13133 && break || sleep 1
          done

      - name: Warmup
        run: |
          telemetrygen traces --otlp-endpoint localhost:4317 --otlp-insecure \
              --rate 1000 --duration ${WARMUP_SEC}s --workers 2
          sleep 10

      - name: Run canary workload
        id: canary
        run: |
          telemetrygen traces --otlp-endpoint localhost:4317 --otlp-insecure \
              --rate 1000 --duration 60s --workers 2 \
              --telemetry-attributes 'phase="canary"' \
              > canary_${{ matrix.iteration }}.log 2>&1
          bash scripts/collect_prom_metrics.sh > canary_metrics_${{ matrix.iteration }}.json

      - name: Run main workload
        run: |
          bash scripts/collect_prom_metrics.sh --tag pre_${{ matrix.iteration }} \
              > pre_metrics_${{ matrix.iteration }}.json
          taskset -c 0-3 telemetrygen traces \
              --otlp-endpoint localhost:4317 --otlp-insecure \
              --rate ${LOAD_SPANS_PER_SEC} \
              --duration ${LOAD_DURATION_SEC}s \
              --workers ${LOAD_WORKERS} \
              --child-spans 4 \
              --service bench-svc \
              --telemetry-attributes 'phase="steady_state"' \
              > gen_${{ matrix.iteration }}.log 2>&1
          # Let queues drain fully before measuring
          sleep 30
          bash scripts/collect_prom_metrics.sh --tag post_${{ matrix.iteration }} \
              > post_metrics_${{ matrix.iteration }}.json

      - name: Extract iteration result
        run: |
          python scripts/build_run_json.py \
            --pre  pre_metrics_${{ matrix.iteration }}.json \
            --post post_metrics_${{ matrix.iteration }}.json \
            --canary canary_metrics_${{ matrix.iteration }}.json \
            --out  run_${{ matrix.iteration }}.json

      - name: Stop collector
        if: always()
        run: |
          [ -f collector.pid ] && kill "$(cat collector.pid)" || true
          sleep 5

      - name: Upload iteration artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ matrix.iteration }}
          path: |
            run_${{ matrix.iteration }}.json
            collector.log
            gen_${{ matrix.iteration }}.log
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 2) Compare to rolling 7-day baseline and produce the scorecard
  # ---------------------------------------------------------------------------
  score:
    name: Score vs. 7-day baseline
    needs: bench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      overall: ${{ steps.compare.outputs.overall }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml scipy numpy

      - name: Download all iteration artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: run-*
          path: iterations
          merge-multiple: true

      - name: Merge iterations into single current.json
        run: |
          python scripts/merge_iterations.py \
              --input-dir iterations \
              --out current.json

      - name: Configure AWS for baseline read
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PERF_BASELINE_ROLE }}
          aws-region: us-east-1

      - name: Fetch rolling 7-day baseline
        run: |
          python scripts/fetch_baseline.py \
              --bucket otel-perf-baselines \
              --prefix nightly/ \
              --window-days 7 \
              --out baseline.json

      - name: Compare to baseline
        id: compare
        run: |
          set +e
          python scripts/compare_to_baseline.py \
              --config "$BUDGET_CONFIG" \
              --current  current.json \
              --baseline baseline.json \
              --out-json "$REPORT_DIR/scorecard.json" \
              --out-md   "$REPORT_DIR/scorecard.md"
          code=$?
          case $code in
            0) echo "overall=PASS" >> "$GITHUB_OUTPUT" ;;
            1) echo "overall=FAIL" >> "$GITHUB_OUTPUT" ;;
            2) echo "overall=INFRA_NOISE" >> "$GITHUB_OUTPUT" ;;
            *) echo "overall=ERROR" >> "$GITHUB_OUTPUT"; exit $code ;;
          esac

      - name: Upload scorecard
        uses: actions/upload-artifact@v4
        with:
          name: scorecard
          path: reports/
          retention-days: 90

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: otel-perf-scorecard
          path: reports/scorecard.md

      - name: Publish check summary
        if: always()
        run: |
          {
            echo "## OTel Nightly Performance Scorecard"
            cat reports/scorecard.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Slack notify on FAIL
        if: steps.compare.outputs.overall == 'FAIL'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ vars.SLACK_PERF_CHANNEL }}
          payload-file-path: reports/scorecard.json
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack notify infra on canary regression
        if: steps.compare.outputs.overall == 'INFRA_NOISE'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ vars.SLACK_INFRA_CHANNEL }}
          slack-message: >
            :warning: Nightly OTel perf run flagged INFRA_NOISE — canary
            workload regressed. Runner may have a noisy neighbor.
            See run ${{ github.run_id }}.
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Fail the job (blocks merge)
        if: steps.compare.outputs.overall == 'FAIL' && github.event.inputs.dry_run != 'true'
        run: |
          echo "::error::Performance budget exceeded. See scorecard."
          exit 1

  # ---------------------------------------------------------------------------
  # 3) Promote today's run into the baseline history on green nightly
  # ---------------------------------------------------------------------------
  promote-baseline:
    name: Promote to baseline
    needs: score
    if: >
      github.event_name == 'schedule' &&
      needs.score.outputs.overall == 'PASS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install boto3
      - uses: actions/download-artifact@v4
        with: { name: scorecard, path: reports }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PERF_BASELINE_ROLE }}
          aws-region: us-east-1
      - name: Upload today's run to baseline bucket
        run: |
          python scripts/promote_baseline.py \
              --bucket otel-perf-baselines \
              --prefix nightly/ \
              --scorecard reports/scorecard.json \
              --retention-days 90
